<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEYSARAH 後台管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{background:#f5f0eb;font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:60px}

    /* Header */
    .header{background:#1a1a1a;color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
    .header-title{font-size:.9rem;letter-spacing:4px}
    .header-sub{font-size:.65rem;color:#888;letter-spacing:2px}

    /* Tabs */
    .tabs{background:#fff;display:flex;border-bottom:1px solid #eee}
    .tab{
      flex:1;text-align:center;padding:14px 8px;font-size:.78rem;color:#999;
      cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;
    }
    .tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}

    /* Content */
    .content{max-width:760px;margin:0 auto;padding:24px 16px}

    /* Cards */
    .card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px}
    .card-title{font-size:.82rem;font-weight:500;color:#333;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}

    /* Steps */
    .steps{display:flex;align-items:center;margin-bottom:24px}
    .step{
      width:32px;height:32px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.78rem;font-weight:500;
      background:#eee;color:#999;flex-shrink:0;
    }
    .step.active{background:#1a1a1a;color:#fff}
    .step.done{background:#a8d5a2;color:#fff}
    .step-line{flex:1;height:1px;background:#eee}

    /* Textarea */
    .chat-area{
      width:100%;border:1.5px solid #e8e2d9;border-radius:12px;
      padding:14px;font-size:.84rem;font-family:inherit;
      background:#faf8f5;resize:vertical;min-height:200px;
      outline:none;line-height:1.8;transition:border-color .2s;
    }
    .chat-area:focus{border-color:#b8975a}
    .chat-area::placeholder{color:#ccc}

    /* Hint chips */
    .hints{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
    .hint-chip{
      font-size:.68rem;color:#888;background:#f5f5f5;
      border-radius:100px;padding:4px 10px;
    }

    /* Count bar */
    .count-bar{
      display:none;margin-top:10px;
      font-size:.78rem;color:#1a6b40;font-weight:500;
    }

    /* Buttons */
    .btn{
      border:none;border-radius:10px;padding:12px 20px;
      font-size:.82rem;font-family:inherit;font-weight:500;cursor:pointer;transition:all .2s;
    }
    .btn-primary{background:#1a1a1a;color:#fff}
    .btn-primary:hover{opacity:.8}
    .btn-primary:disabled{background:#ccc;cursor:default}
    .btn-ghost{background:#f5f5f5;color:#666}
    .btn-ghost:hover{background:#eee}
    .btn-danger{background:#fee2e2;color:#991b1b}
    .btn-success{background:#d1fae5;color:#065f46}

    /* Table */
    .tbl{width:100%;border-collapse:collapse;font-size:.78rem}
    .tbl th{text-align:left;padding:8px 10px;color:#aaa;font-weight:400;border-bottom:1px solid #f0f0f0}
    .tbl td{padding:10px;border-bottom:1px solid #f8f8f8;vertical-align:middle}
    .tbl tr:last-child td{border-bottom:none}

    /* Status badges */
    .badge{font-size:.68rem;padding:3px 10px;border-radius:100px;font-weight:500;display:inline-block}
    .s-待確認{background:#fff3cd;color:#856404}
    .s-已付款{background:#d1e7dd;color:#0a3622}
    .s-已出貨{background:#cfe2ff;color:#084298}
    .s-取消{background:#f8d7da;color:#842029}

    /* Filter buttons */
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .filter-btn{
      border:1.5px solid #e0e0e0;border-radius:100px;
      padding:6px 14px;font-size:.74rem;font-family:inherit;
      background:#fff;color:#666;cursor:pointer;transition:all .2s;
    }
    .filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

    /* Toast */
    .toast{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:100px;
      font-size:.8rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;
    }
    .toast.show{opacity:1}

    /* Import review table */
    .import-table{width:100%;border-collapse:collapse;font-size:.76rem}
    .import-table th{background:#f8f8f8;padding:8px 10px;text-align:left;color:#666;font-weight:500}
    .import-table td{padding:9px 10px;border-bottom:1px solid #f0f0f0}
    .import-table tr:last-child td{border-bottom:none}
    .import-table input{
      border:1px solid #e8e8e8;border-radius:6px;padding:4px 8px;
      font-size:.74rem;font-family:inherit;width:100%;outline:none;
    }
    .import-table input:focus{border-color:#b8975a}

    /* Row action */
    .row-del{background:none;border:none;color:#ddd;cursor:pointer;font-size:1rem;padding:2px 6px;transition:color .2s}
    .row-del:hover{color:#e53e3e}

    /* Empty state */
    .empty{text-align:center;color:#bbb;padding:40px 20px;font-size:.82rem}

    /* Step 3 success */
    .success-box{text-align:center;padding:32px 20px}
    .success-box .icon{font-size:3rem;margin-bottom:12px}
    .success-box .msg{font-size:.9rem;color:#333;margin-bottom:6px}
    .success-box .sub{font-size:.76rem;color:#aaa}
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">HEYSARAH</div>
    <div class="header-sub">後台管理系統</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('import')">📥 批次匯入</div>
  <div class="tab" onclick="switchTab('payment')">💳 付款管理</div>
  <div class="tab" onclick="switchTab('stall')">🏪 檔口下單</div>
</div>

<!-- ══════════════════════════════ 批次匯入 ══════════════════════════════ -->
<div id="tab-import" class="content">

  <!-- Steps indicator -->
  <div class="steps">
    <div class="step active" id="s1">1</div>
    <div class="step-line"></div>
    <div class="step" id="s2">2</div>
    <div class="step-line"></div>
    <div class="step" id="s3">3</div>
  </div>

  <!-- Step 1 -->
  <div id="step1">
    <div class="card">
      <div class="card-title">
        <span>貼上社群留言</span>
        <button class="btn btn-ghost" style="padding:6px 12px;font-size:.74rem" onclick="clearChat()">清除</button>
      </div>
      <p style="font-size:.76rem;color:#aaa;margin-bottom:12px">把 LINE 社群訊息全選複製貼在這裡，系統自動辨識下單內容（支援時間戳記格式）</p>
      <textarea id="chatInput" class="chat-area" placeholder="在此貼上 LINE 社群訊息..." oninput="onChatInput()"></textarea>
      <div class="hints">
        <span class="hint-chip">✓ 時間戳記格式</span>
        <span class="hint-chip">✓ 暱稱獨立一行</span>
        <span class="hint-chip">✓ E20灰1（無加號）</span>
        <span class="hint-chip">✓ E16 黑+2</span>
      </div>
      <div id="countBar" class="count-bar"></div>
      <div style="display:flex;justify-content:flex-end;margin-top:16px">
        <button id="parseBtn" class="btn btn-primary" disabled onclick="doParseStep()">解析訂單</button>
      </div>
    </div>
  </div>

  <!-- Step 2 -->
  <div id="step2" style="display:none">
    <div class="card">
      <div class="card-title">
        <span>確認解析結果</span>
        <span id="parseCount" style="font-size:.74rem;color:#aaa"></span>
      </div>
      <p style="font-size:.76rem;color:#aaa;margin-bottom:14px">請確認以下訂單資料，可直接在表格內修改</p>
      <div style="overflow-x:auto">
        <table class="import-table">
          <thead>
            <tr>
              <th>暱稱</th><th>商品代號</th><th>規格</th><th>數量</th><th></th>
            </tr>
          </thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="backToStep1()">← 重新貼上</button>
        <button class="btn btn-primary" onclick="doImport()">匯入 Google Sheets</button>
      </div>
    </div>
  </div>

  <!-- Step 3 -->
  <div id="step3" style="display:none">
    <div class="card">
      <div class="success-box">
        <div class="icon">✅</div>
        <div class="msg">匯入完成！</div>
        <div class="sub" id="importResult" style="margin:8px 0 24px"></div>
        <button class="btn btn-primary" onclick="resetImport()">繼續匯入</button>
      </div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════ 付款管理 ══════════════════════════════ -->
<div id="tab-payment" class="content" style="display:none">
  <div class="filters">
    <button class="filter-btn active" onclick="filterOrders('all',this)">全部</button>
    <button class="filter-btn" onclick="filterOrders('待確認',this)">待確認</button>
    <button class="filter-btn" onclick="filterOrders('已付款',this)">已付款</button>
    <button class="filter-btn" onclick="filterOrders('已出貨',this)">已出貨</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <table class="tbl">
      <thead>
        <tr>
          <th>訂單</th><th>暱稱</th><th>商品</th><th>金額</th><th>狀態</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="paymentBody">
        <tr><td colspan="6"><div class="empty">載入中…</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ══════════════════════════════ 檔口下單 ══════════════════════════════ -->
<div id="tab-stall" class="content" style="display:none">
  <div class="card">
    <div class="card-title">檔口快速下單</div>
    <p style="font-size:.76rem;color:#aaa;margin-bottom:16px">在現場直接幫顧客建立訂單</p>
    <div style="display:grid;gap:12px">
      <div>
        <label style="font-size:.74rem;color:#555;display:block;margin-bottom:5px">顧客暱稱</label>
        <input id="stallNick" type="text" placeholder="輸入 LINE 暱稱" style="width:100%;border:1.5px solid #e5ddd5;border-radius:8px;padding:11px 13px;font-size:.84rem;font-family:inherit;outline:none;background:#faf8f5">
      </div>
      <div>
        <label style="font-size:.74rem;color:#555;display:block;margin-bottom:5px">商品代號</label>
        <input id="stallCode" type="text" placeholder="例：E20" style="width:100%;border:1.5px solid #e5ddd5;border-radius:8px;padding:11px 13px;font-size:.84rem;font-family:inherit;outline:none;background:#faf8f5;text-transform:uppercase">
      </div>
      <div>
        <label style="font-size:.74rem;color:#555;display:block;margin-bottom:5px">規格（可空白）</label>
        <input id="stallSpec" type="text" placeholder="例：黑L" style="width:100%;border:1.5px solid #e5ddd5;border-radius:8px;padding:11px 13px;font-size:.84rem;font-family:inherit;outline:none;background:#faf8f5">
      </div>
      <div>
        <label style="font-size:.74rem;color:#555;display:block;margin-bottom:5px">數量</label>
        <input id="stallQty" type="number" value="1" min="1" style="width:100%;border:1.5px solid #e5ddd5;border-radius:8px;padding:11px 13px;font-size:.84rem;font-family:inherit;outline:none;background:#faf8f5">
      </div>
      <button class="btn btn-primary" style="width:100%;padding:14px" onclick
