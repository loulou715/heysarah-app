<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HEYSARAH 管理後台</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#FAF8F5;color:#1A1713;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#F3F0EB}::-webkit-scrollbar-thumb{background:#C8BFB3;border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
.sp{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
.sp-k{border-color:#E8E2D9;border-top-color:#1A1713}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .3s ease both}
.card{background:#fff;border:1px solid #E8E2D9;border-radius:16px}
.inp{background:#F3F0EB;border:1px solid #E8E2D9;border-radius:8px;padding:12px 14px;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:#1A1713;width:100%;transition:border-color .2s}
.inp:focus{outline:none;border-color:#1A1713}
.inp::placeholder{color:#C8BFB3}
textarea.inp{resize:vertical;line-height:1.7}
.btn{background:#1A1713;color:#FAF8F5;font-family:'Noto Sans TC',sans-serif;font-size:12px;letter-spacing:.1em;padding:11px 20px;border-radius:8px;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;white-space:nowrap;transition:background .2s}
.btn:hover:not(:disabled){background:#2E2A26}
.btn:disabled{background:#C8BFB3;cursor:not-allowed}
.btn-g{background:#1A6B40;color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:12px;padding:11px 20px;border-radius:8px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .2s}
.btn-g:hover:not(:disabled){background:#155734}
.btn-g:disabled{background:#A8E6C3;cursor:not-allowed;color:#fff}
.btn-ol{background:transparent;color:#1A1713;border:1px solid #E8E2D9;font-family:'Noto Sans TC',sans-serif;font-size:12px;padding:9px 14px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn-ol:hover{border-color:#C8BFB3;background:#F3F0EB}
.tab{font-family:'Noto Sans TC',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:14px 16px;border:none;background:none;cursor:pointer;color:#8C8279;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s,border-color .2s}
.tab.on{color:#1A1713;border-bottom-color:#1A1713}
.pill{font-family:'Noto Sans TC',sans-serif;font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid #E8E2D9;background:#fff;color:#8C8279;cursor:pointer;transition:all .15s}
.pill:hover{border-color:#C8BFB3;color:#1A1713}
.pill.on{border-color:#1A1713;background:#1A1713;color:#fff}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:20px;flex-shrink:0}
.cp{background:#FEF9EC;color:#92661A;border:1px solid #F5E0A0}
.ca{background:#EDFBF3;color:#1A6B40;border:1px solid #A8E6C3}
.cs{background:#EEF4FD;color:#1A3E7A;border:1px solid #A8C4F0}
.cx{background:#FDF0EE;color:#8C2A1A;border:1px solid #F0C0B8}
.hr-deco{border:none;height:1px;background:linear-gradient(90deg,transparent,#E8E2D9,transparent);margin:12px 0}
.st{font-family:'Noto Sans TC',sans-serif;font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid #E8E2D9;background:#fff;color:#8C8279;cursor:pointer;transition:all .15s}
.st:hover{border-color:#C8BFB3;background:#F3F0EB;color:#1A1713}
.st.on{border-color:#1A1713;background:#1A1713;color:#fff}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#8C8279;font-weight:400;padding:10px 12px;border-bottom:1px solid #E8E2D9}
.tbl td{padding:9px 12px;border-bottom:1px solid #F3F0EB;font-family:'Noto Sans TC',sans-serif;font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#FAFAF8}
.sbox{background:#F3F0EB;border-radius:12px;padding:16px;text-align:center}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:none;transition:opacity .3s;opacity:0}
.sdot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.order-cb{width:18px;height:18px;accent-color:#C0392B;cursor:pointer;flex-shrink:0;margin-top:3px}
.btn-red{background:#C0392B;color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:12px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn-red:disabled{background:#F0A0A0;cursor:not-allowed}
</style>
</head>
<body>

<header style='background:#fff;border-bottom:1px solid #E8E2D9;position:sticky;top:0;z-index:20;padding:0 24px;'>
  <div style='max-width:900px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between;'>
    <div style='display:flex;align-items:center;gap:14px;'>
      <span style='font-family:Cormorant Garamond,serif;font-size:22px;font-style:italic;color:#1A1713;font-weight:400;'>HEYSARAH</span>
      <div style='width:1px;height:20px;background:#E8E2D9;'></div>
      <span style='font-family:Noto Sans TC,sans-serif;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#8C8279;'>管理後台</span>
    </div>
    <button onclick='window.open("/","_blank")' class='btn-ol' style='font-size:11px;'>→ 顧客查詢頁</button>
  </div>
</header>

<div style='background:#fff;border-bottom:1px solid #E8E2D9;overflow-x:auto;'>
  <div style='max-width:900px;margin:0 auto;padding:0 24px;display:flex;'>
    <button class='tab on' id='t-import' onclick='switchTab("import")'>📥 批次匯入</button>
    <button class='tab' id='t-payment' onclick='switchTab("payment")'>💳 付款管理</button>
    <button class='tab' id='t-supplier' onclick='switchTab("supplier")'>📦 檔口下單</button>
  </div>
</div>

<main style='max-width:900px;margin:0 auto;padding:28px 24px 80px;'>

<!-- TAB 1 -->
<div id='p-import'>
  <div style='display:flex;align-items:center;margin-bottom:24px;gap:6px;'>
    <div class='sdot' id='sd1' style='background:#1A1713;color:#fff;'>1</div>
    <div style='flex:1;height:1px;background:#E8E2D9;'></div>
    <div class='sdot' id='sd2' style='background:#F3F0EB;color:#C8BFB3;border:1px solid #E8E2D9;'>2</div>
    <div style='flex:1;height:1px;background:#E8E2D9;'></div>
    <div class='sdot' id='sd3' style='background:#F3F0EB;color:#C8BFB3;border:1px solid #E8E2D9;'>3</div>
  </div>

  <div id='pane-paste'>
    <div class='card' style='padding:24px;'>
      <div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;'>
        <div>
          <h2 style='font-family:Cormorant Garamond,serif;font-size:22px;font-style:italic;font-weight:400;margin-bottom:4px;'>貼上社群留言</h2>
          <p style='font-size:12px;color:#8C8279;'>把 LINE 社群訊息全選複製貼在這裡，系統自動辨識下單內容（支援時間戳記格式）</p>
        </div>
        <button onclick='doClear()' class='btn-ol' style='flex-shrink:0;margin-left:16px;'>清除</button>
      </div>
      <textarea id='txt' class='inp' rows='11' oninput='onInput()'
        placeholder='支援格式：&#10;20:41 小v E25 米杏 L+1&#10;20:55 natalie E25 米杏XL+1&#10;E30 藍XL+1&#10;21:00 ChenChen E20灰1&#10;&#10;（系統自動略過閒聊訊息）'></textarea>
      <div style='display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;'>
        <span style='font-size:10px;color:#8C8279;border:1px solid #E8E2D9;border-radius:20px;padding:3px 10px;'>✓ 時間戳記格式</span>
        <span style='font-size:10px;color:#8C8279;border:1px solid #E8E2D9;border-radius:20px;padding:3px 10px;'>✓ 暱稱獨立一行</span>
        <span style='font-size:10px;color:#8C8279;border:1px solid #E8E2D9;border-radius:20px;padding:3px 10px;'>✓ E20灰1（無加號）</span>
        <span style='font-size:10px;color:#8C8279;border:1px solid #E8E2D9;border-radius:20px;padding:3px 10px;'>✓ E16 黑+2</span>
      </div>
      <div style='display:flex;align-items:center;justify-content:space-between;margin-top:18px;'>
        <p id='det' style='font-size:13px;min-height:20px;font-family:Noto Sans TC,sans-serif;'></p>
        <button id='parse-btn' onclick='doParse()' disabled class='btn'>
          <span id='pl'>解析訂單</span>
          <span id='ps' class='sp' style='display:none;'></span>
        </button>
      </div>
    </div>
  </div>

  <div id='pane-preview' style='display:none;' class='fu'>
    <div class='card' style='padding:24px;'>
      <div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;'>
        <div>
          <h2 style='font-family:Cormorant Garamond,serif;font-size:22px;font-style:italic;font-weight:400;margin-bottom:4px;'>確認解析結果</h2>
          <p id='psub' style='font-size:12px;color:#8C8279;'></p>
        </div>
        <button onclick='doBack()' class='btn-ol' style='flex-shrink:0;margin-left:16px;'>← 重新貼上</button>
      </div>
      <div style='background:#F3F0EB;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:#8C8279;'>
        💡 暱稱欄可直接點擊編輯，確認正確後再匯入
      </div>
      <div style='overflow-x:auto;border:1px solid #E8E2D9;border-radius:10px;'>
        <table class='tbl'>
          <thead><tr>
            <th>暱稱</th><th>商品碼</th><th>規格</th><th style='text-align:center;'>數量</th><th></th>
          </tr></thead>
          <tbody id='pbody'></tbody>
        </table>
      </div>
      <div style='display:flex;align-items:center;justify-content:space-between;margin-top:16px;'>
        <p id='pstat' style='font-size:12px;color:#8C8279;'></p>
        <button id='imp-btn' onclick='doImport()' class='btn-g'>
          <span id='il'>確認匯入</span>
          <span id='is' class='sp' style='display:none;'></span>
        </button>
      </div>
    </div>
  </div>

  <div id='pane-success' style='display:none;' class='fu'>
    <div class='card' style='padding:48px 24px;text-align:center;'>
      <div style='width:56px;height:56px;border-radius:50%;background:#EDFBF3;border:1px solid #A8E6C3;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;'>
        <svg width='24' height='24' fill='none' stroke='#1A6B40' stroke-width='1.8' viewBox='0 0 24 24'><path stroke-linecap='round' stroke-linejoin='round' d='M5 13l4 4L19 7'/></svg>
      </div>
      <h2 style='font-family:Cormorant Garamond,serif;font-size:26px;font-style:italic;font-weight:400;margin-bottom:8px;'>匯入完成</h2>
      <p id='smsg' style='font-size:13px;color:#8C8279;margin-bottom:28px;'></p>
      <div style='display:flex;gap:10px;justify-content:center;'>
        <button onclick='doReset()' class='btn-ol'>繼續匯入</button>
        <button onclick='switchTab("payment")' class='btn'>查看訂單</button>
      </div>
    </div>
  </div>
</div>

<!-- TAB 2 -->
<div id='p-payment' style='display:none;'>
  <div style='display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;'>
    <button class='pill on' id='fa' onclick='loadOrders("all")'>全部</button>
    <button class='pill' id='fp' onclick='loadOrders("待確認")'>⏳ 待確認</button>
    <button class='pill' id='fpa' onclick='loadOrders("已付款")'>✅ 已付款</button>
    <button class='pill' id='fsh' onclick='loadOrders("已出貨")'>🚚 已出貨</button>
    <button onclick='loadOrders(curF)' class='btn-ol' style='margin-left:auto;padding:6px 12px;font-size:11px;'>↺ 重新整理</button>
  </div>
  <div id='pload' style='display:none;text-align:center;padding:48px;'><div class='sp sp-k' style='margin:0 auto;'></div></div>
  <div id='plist' style='display:flex;flex-direction:column;gap:10px;'></div>
  <div id='del-bar' style='display:none;position:sticky;bottom:0;background:#fff;border-top:1px solid #E8E2D9;padding:12px 24px;flex-direction:row;align-items:center;justify-content:space-between;gap:12px;z-index:10;'>
    <div style='display:flex;align-items:center;gap:10px;'>
      <input type='checkbox' id='cb-all' onchange='toggleAllCb(this.checked)' style='width:18px;height:18px;accent-color:#C0392B;cursor:pointer;'/>
      <span id='del-count' style='font-size:13px;color:#4A4540;'></span>
    </div>
    <button onclick='doDeleteSelected()' id='del-btn' class='btn-red' disabled>🗑 刪除選取</button>
  </div>
  <div id='pempty' style='display:none;text-align:center;padding:64px 0;font-size:14px;color:#4A4540;'>此狀態沒有訂單</div>
</div>

<!-- TAB 3 -->
<div id='p-supplier' style='display:none;'>
  <div class='card' style='padding:24px;margin-bottom:16px;'>
    <div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;'>
      <div>
        <h2 style='font-family:Cormorant Garamond,serif;font-size:22px;font-style:italic;font-weight:400;margin-bottom:4px;'>檔口下單統計</h2>
        <p style='font-size:12px;color:#8C8279;'>依商品彙整數量，一鍵複製傳給檔口</p>
      </div>
      <button onclick='loadSup()' class='btn-ol' style='flex-shrink:0;margin-left:16px;'>↺ 重新整理</button>
    </div>
    <div style='display:flex;gap:8px;margin-bottom:18px;'>
      <button class='pill on' id='sa' onclick='setSF("all")'>全部</button>
      <button class='pill' id='spa' onclick='setSF("paid")'>✅ 已付款</button>
      <button class='pill' id='spe' onclick='setSF("pending")'>⏳ 待確認</button>
    </div>
    <div id='sload' style='display:none;text-align:center;padding:32px;'><div class='sp sp-k' style='margin:0 auto;'></div></div>
    <div id='scont'><p style='font-size:13px;color:#C8BFB3;text-align:center;padding:32px 0;'>點「重新整理」載入</p></div>
  </div>
  <div id='scopy' class='card' style='padding:20px;display:none;'>
    <div style='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;'>
      <p style='font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#8C8279;'>複製下單訊息</p>
      <button onclick='doCopyTxt()' class='btn' style='padding:8px 16px;'>複製</button>
    </div>
    <pre id='ctxt' style='font-size:12px;color:#4A4540;background:#F3F0EB;border-radius:10px;padding:14px;white-space:pre-wrap;line-height:1.8;'></pre>
  </div>
</div>

</main>

<div id='toast'><div id='ti' style='padding:12px 20px;border-radius:10px;font-size:13px;box-shadow:0 4px 20px rgba(26,23,19,.12);white-space:nowrap;'></div></div>

<script>
// ★ 你的 GAS API 網址
var API = 'https://script.google.com/macros/s/AKfycby9JB0Y54FGdqVOPmWhjC83Nm8DcEW2XYXnO6Nnhx9yVWnPVcXbJCvBoo5l-oj4WDk9zA/exec';

// ── fetch 呼叫 GAS API ──────────────────────────────────────────
function gasCall(action, params, onSuccess, onError) {
  var qs = 'action=' + action;
  for (var k in params) {
    var v = params[k];
    qs += '&' + k + '=' + encodeURIComponent(typeof v === 'object' ? JSON.stringify(v) : v);
  }
  fetch(API + '?' + qs)
    .then(function(r) { return r.json(); })
    .then(onSuccess)
    .catch(onError || function(e) { showToast('連線失敗：' + e.message, true); });
}

var parsed = [];
var selIds  = {};
var curF   = 'all';
var supF   = 'all';

var CHIPS = {
  '待確認': ['cp', '⏳'],
  '已付款': ['ca', '✅'],
  '已出貨': ['cs', '🚚'],
  '取消':   ['cx', '❌']
};

var SKIP_WORDS = ['圖片','已分享記事本','已收回','貼圖','影片','請問','想問','謝謝','好的','對啊','護照','私訊','記事本','推薦','實拍','分享記事','穿搭影片'];

function shouldSkip(s) {
  for (var i = 0; i < SKIP_WORDS.length; i++) {
    if (s.indexOf(SKIP_WORDS[i]) >= 0) return true;
  }
  return false;
}

function getOrdersFromLine(line) {
  var out = [];
  var rePlus = /([A-Za-z]\d+)\s*(.{0,20}?)\s*\+\s*(\d+)/g;
  var m;
  while ((m = rePlus.exec(line)) !== null) {
    var q = parseInt(m[3], 10);
    if (q >= 1 && q <= 50) {
      out.push({ code: m[1].toUpperCase(), spec: m[2].trim().replace(/^\/+|\/+$/g, '').trim(), qty: q });
    }
  }
  if (out.length === 0) {
    var reNoPlus = /([A-Za-z]\d+)\s*([^\d\n]{0,10}?)\s*(\d+)\s*$/g;
    while ((m = reNoPlus.exec(line)) !== null) {
      var q = parseInt(m[3], 10);
      if (q >= 1 && q <= 50) {
        out.push({ code: m[1].toUpperCase(), spec: m[2].trim(), qty: q });
      }
    }
  }
  return out;
}

function parseAll(text) {
  var out   = [];
  var lines = text.split('\n');
  var nick  = '未知';
  for (var i = 0; i < lines.length; i++) {
    var raw = lines[i].trim();
    if (!raw) continue;
    if (shouldSkip(raw)) continue;
    var line = raw;
    var ts = raw.match(/^(\d{1,2}:\d{2})\s+(.+)$/);
    if (ts) {
      var rest = ts[2].trim();
      var pm   = rest.match(/[A-Za-z]\d+/);
      if (pm) {
        var pi = rest.indexOf(pm[0]);
        var np = rest.substring(0, pi).trim().replace(/[:\uff1a\s]+$/, '').trim();
        if (np) nick = np;
        line = rest.substring(pi);
      } else {
        if (!shouldSkip(rest) && rest.length < 40) nick = rest;
        continue;
      }
    } else {
      var cm = raw.match(/^([^\uff1a:>+A-Za-z\d]{1,25})[\uff1a:>]\s*(.+)$/);
      if (cm) {
        nick = cm[1].trim();
        line = cm[2].trim();
      } else if (!raw.match(/[A-Za-z]\d+/) && raw.length < 40 && !shouldSkip(raw)) {
        nick = raw;
        continue;
      }
    }
    var found = getOrdersFromLine(line);
    for (var j = 0; j < found.length; j++) {
      out.push({ nickname: nick, productCode: found[j].code, spec: found[j].spec, qty: found[j].qty });
    }
  }
  return out;
}

function onInput() {
  var val = document.getElementById('txt').value;
  var det = document.getElementById('det');
  var btn = document.getElementById('parse-btn');
  if (!val.trim()) { det.textContent = ''; btn.disabled = true; return; }
  var tmp = parseAll(val);
  if (tmp.length > 0) {
    det.textContent = '✓ 偵測到 ' + tmp.length + ' 筆下單格式';
    det.style.color = '#1A6B40';
    det.style.fontWeight = '500';
    btn.disabled = false;
  } else {
    det.textContent = '⚠ 未偵測到符合格式的訂單（格式需含商品編號）';
    det.style.color = '#92661A';
    det.style.fontWeight = '400';
    btn.disabled = true;
  }
}

function doParse() {
  var val = document.getElementById('txt').value.trim();
  if (!val) return;
  setL('parse', true);
  parsed = parseAll(val);
  setTimeout(function() {
    setL('parse', false);
    if (!parsed.length) {
      alert('未偵測到符合格式的訂單\n\n格式範例：\n小美：E25米杏+1\n20:41 natalie E25米杏XL+1');
      return;
    }
    showPreview(parsed);
  }, 200);
}

function showPreview(orders) {
  document.getElementById('pane-paste').style.display = 'none';
  document.getElementById('pane-preview').style.display = 'block';
  setStep(2);
  var ppl = new Set(orders.map(function(o) { return o.nickname; })).size;
  document.getElementById('psub').textContent = '共 ' + orders.length + ' 筆訂單·' + ppl + ' 位顧客';
  document.getElementById('pstat').textContent = orders.length + ' 筆·' + ppl + ' 位顧客';
  var rows = '';
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    rows += '<tr>' +
      '<td><input type="text" value="' + esc(o.nickname) + '" data-idx="' + i + '" onchange="parsed[this.getAttribute(\'data-idx\')].nickname=this.value" style="background:transparent;border:none;border-bottom:1px solid #E8E2D9;font-size:13px;width:130px;outline:none;padding-bottom:2px;color:#1A1713;"/></td>' +
      '<td><b style="font-family:monospace;font-size:12px;">' + esc(o.productCode) + '</b></td>' +
      '<td style="color:#8C8279;font-size:12px;">' + esc(o.spec || '—') + '</td>' +
      '<td style="text-align:center;">' + o.qty + '</td>' +
      '<td><button data-idx="' + i + '" onclick="rmRow(parseInt(this.getAttribute(\'data-idx\')))" style="background:none;border:none;cursor:pointer;color:#C8BFB3;font-size:14px;" onmouseover="this.style.color=\'#C0392B\'" onmouseout="this.style.color=\'#C8BFB3\'">✕</button></td>' +
      '</tr>';
  }
  document.getElementById('pbody').innerHTML = rows;
}

function rmRow(idx) {
  parsed.splice(idx, 1);
  if (!parsed.length) { doBack(); return; }
  showPreview(parsed);
}

function doImport() {
  if (!parsed.length) return;
  setL('imp', true);
  gasCall('import', { orders: parsed }, function(r) {
    setL('imp', false);
    if (r.success) {
      document.getElementById('pane-preview').style.display = 'none';
      document.getElementById('pane-success').style.display = 'block';
      document.getElementById('smsg').textContent = '成功匯入 ' + r.count + ' 筆訂單至 Google Sheets';
      setStep(3);
    } else { showToast('匯入失敗：' + r.message, true); }
  }, function(e) { setL('imp', false); showToast('匯入失敗：' + e.message, true); });
}

function doBack()  { document.getElementById('pane-preview').style.display='none'; document.getElementById('pane-paste').style.display='block'; setStep(1); }
function doReset() {
  parsed = [];
  document.getElementById('pane-success').style.display='none';
  document.getElementById('pane-paste').style.display='block';
  document.getElementById('txt').value='';
  document.getElementById('det').textContent='';
  document.getElementById('parse-btn').disabled=true;
  setStep(1);
}
function doClear() { document.getElementById('txt').value=''; document.getElementById('det').textContent=''; document.getElementById('parse-btn').disabled=true; }

function setL(w, on) {
  var btn = document.getElementById(w==='parse'?'parse-btn':'imp-btn');
  var lbl = document.getElementById(w==='parse'?'pl':'il');
  var sp  = document.getElementById(w==='parse'?'ps':'is');
  if (btn) btn.disabled = on;
  if (lbl) lbl.style.display = on ? 'none' : 'inline';
  if (sp)  sp.style.display  = on ? 'inline-block' : 'none';
}

function setStep(n) {
  for (var i = 1; i <= 3; i++) {
    var el = document.getElementById('sd' + i);
    if (i < n)        { el.style.background='#1A6B40'; el.style.color='#fff'; el.style.border='none'; }
    else if (i === n) { el.style.background='#1A1713'; el.style.color='#fff'; el.style.border='none'; }
    else              { el.style.background='#F3F0EB'; el.style.color='#C8BFB3'; el.style.border='1px solid #E8E2D9'; }
  }
}

function loadOrders(f) {
  curF = f;
  var map = { 'all': 'fa', '待確認': 'fp', '已付款': 'fpa', '已出貨': 'fsh' };
  Object.keys(map).forEach(function(k) {
    var el = document.getElementById(map[k]);
    if (el) el.className = 'pill' + (k === f ? ' on' : '');
  });
  document.getElementById('pload').style.display = 'block';
  document.getElementById('plist').innerHTML = '';
  document.getElementById('pempty').style.display = 'none';
  document.getElementById('del-bar').style.display = 'none';
  gasCall('allOrders', { status: f }, function(r) {
    document.getElementById('pload').style.display = 'none';
    if (!r.success) { showToast('載入失敗', true); return; }
    renderOrders(r.orders);
  }, function() { document.getElementById('pload').style.display='none'; showToast('載入失敗', true); });
}

function renderOrders(orders) {
  var list  = document.getElementById('plist');
  var empty = document.getElementById('pempty');
  if (!orders.length) { empty.style.display = 'block'; return; }
  var html = '';
  for (var i = 0; i < orders.length; i++) {
    var o    = orders[i];
    var ch   = CHIPS[o.status] || ['cp', '📌'];
    var paid = o.status === '已付款' || o.status === '已出貨';
    html += '<div class="card fu" style="padding:18px 20px;">' +
      '<div style="display:flex;align-items:flex-start;gap:10px;">' +
      '<input type="checkbox" class="order-cb" data-id="' + esc(o.orderId) + '" onchange="onCbChange(this)" style="margin-top:4px;"/>' +
      '<div style="flex:1;">' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;">' +
        '<div>' +
          '<p style="font-size:14px;font-weight:500;">' + esc(o.nickname) + '</p>' +
          '<p style="font-family:monospace;font-size:10px;color:#8C8279;margin-top:3px;">' + esc(o.orderId) + '</p>' +
          '<p style="font-size:11px;color:#C8BFB3;margin-top:2px;">' + esc(o.timestamp) + '</p>' +
        '</div>' +
        '<span class="chip ' + ch[0] + '">' + ch[1] + ' ' + o.status + '</span>' +
      '</div>' +
      '<hr class="hr-deco">' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;">' +
        '<div>' +
          '<div style="display:flex;gap:6px;align-items:baseline;">' +
            '<span style="font-family:monospace;font-size:11px;color:#4A4540;">[' + esc(o.productCode) + ']</span>' +
            '<span style="font-size:14px;">' + esc(o.productName) + '</span>' +
          '</div>' +
          (o.spec ? '<p style="font-size:12px;color:#8C8279;margin-top:3px;">規格：' + esc(o.spec) + '</p>' : '') +
          '<p style="font-size:12px;color:#4A4540;margin-top:3px;">數量：<strong>' + o.qty + '</strong> 件</p>' +
        '</div>' +
        '<div style="text-align:right;">' +
          (o.subtotal > 0
            ? '<p style="font-family:Cormorant Garamond,serif;font-style:italic;font-size:20px;font-weight:400;">NT$' + o.subtotal.toLocaleString() + '</p>' +
              '<p style="font-size:10px;color:' + (paid ? '#1A6B40' : '#92661A') + ';margin-top:2px;">' + (paid ? '✓ 已確認' : '待付款') + '</p>'
            : '<p style="font-size:11px;color:#C8BFB3;">金額待確認</p>'
          ) +
        '</div>' +
      '</div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap;">';
    var statuses = ['待確認', '已付款', '已出貨', '取消'];
    var icons    = ['⏳ ', '✅ ', '🚚 ', '❌ '];
    for (var j = 0; j < statuses.length; j++) {
      html += '<button class="st' + (o.status === statuses[j] ? ' on' : '') + '" ' +
        'onclick="updSt(\'' + escJs(o.orderId) + '\',\'' + statuses[j] + '\')">' +
        icons[j] + statuses[j] + '</button>';
    }
    html += '</div></div></div></div>';
  }
  list.innerHTML = html;
  updateDelBar();
}

function updSt(id, s) {
  gasCall('updateStatus', { orderId: id, status: s }, function(r) {
    if (r.success) { showToast('已更新為「' + s + '」', false); loadOrders(curF); }
    else showToast('更新失敗：' + r.message, true);
  });
}

function setSF(f) {
  supF = f;
  var m = { 'all': 'sa', 'paid': 'spa', 'pending': 'spe' };
  Object.keys(m).forEach(function(k) { document.getElementById(m[k]).className = 'pill' + (k === f ? ' on' : ''); });
  loadSup();
}

function loadSup() {
  document.getElementById('sload').style.display = 'block';
  document.getElementById('scont').innerHTML = '';
  document.getElementById('scopy').style.display = 'none';
  gasCall('summary', { filter: supF }, function(r) {
    document.getElementById('sload').style.display = 'none';
    if (!r.success) { showToast('載入失敗', true); return; }
    renderSup(r);
  }, function() { document.getElementById('sload').style.display='none'; showToast('載入失敗', true); });
}

function renderSup(r) {
  var el  = document.getElementById('scont');
  var lbl = supF === 'paid' ? '已付款' : supF === 'pending' ? '待確認' : '全部';
  if (!r.summary.length) {
    el.innerHTML = '<p style="font-size:13px;color:#C8BFB3;text-align:center;padding:32px 0;">目前沒有訂單資料</p>';
    return;
  }
  var stats = '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;">' +
    '<div class="sbox"><p style="font-family:Cormorant Garamond,serif;font-style:italic;font-size:28px;font-weight:400;">' + r.total + '</p><p style="font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#8C8279;margin-top:4px;">總件數</p></div>' +
    '<div class="sbox"><p style="font-family:Cormorant Garamond,serif;font-style:italic;font-size:28px;font-weight:400;">' + r.summary.length + '</p><p style="font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#8C8279;margin-top:4px;">商品種類</p></div>' +
    '<div class="sbox"><p style="font-family:Cormorant Garamond,serif;font-style:italic;font-size:28px;font-weight:400;">' + r.orderCount + '</p><p style="font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#8C8279;margin-top:4px;">' + lbl + ' 訂單</p></div>' +
    '</div><hr class="hr-deco"><div style="display:flex;flex-direction:column;gap:8px;margin-top:14px;">';
  for (var i = 0; i < r.summary.length; i++) {
    var item = r.summary[i];
    stats += '<div style="display:flex;align-items:center;justify-content:space-between;background:#F3F0EB;border-radius:10px;padding:12px 16px;">' +
      '<div>' +
        '<div style="display:flex;align-items:baseline;gap:8px;">' +
          '<span style="font-family:monospace;font-size:13px;color:#4A4540;font-weight:600;">' + esc(item.code) + '</span>' +
          '<span style="font-size:13px;">' + esc(item.name) + '</span>' +
        '</div>' +
        (item.spec ? '<p style="font-size:11px;color:#8C8279;margin-top:3px;">規格：' + esc(item.spec) + '</p>' : '') +
        '<p style="font-size:11px;color:#C8BFB3;margin-top:2px;">' + item.orders + ' 筆訂單</p>' +
      '</div>' +
      '<div style="text-align:right;">' +
        '<p style="font-family:Cormorant Garamond,serif;font-style:italic;font-size:26px;font-weight:400;">' + item.qty + '</p>' +
        '<p style="font-size:10px;color:#8C8279;">件</p>' +
      '</div>' +
    '</div>';
  }
  stats += '</div>';
  el.innerHTML = stats;
  var today = new Date().toLocaleDateString('zh-TW');
  var lines = ['HEYSARAH 下單清單', '日期：' + today + '（' + lbl + '）', ''];
  for (var j = 0; j < r.summary.length; j++) {
    var it = r.summary[j];
    lines.push(it.code + (it.spec ? ' ' + it.spec : '') + '\t× ' + it.qty + ' 件');
  }
  lines.push('', '合計：' + r.total + ' 件');
  document.getElementById('ctxt').textContent = lines.join('\n');
  document.getElementById('scopy').style.display = 'block';
}

function doCopyTxt() {
  navigator.clipboard.writeText(document.getElementById('ctxt').textContent)
    .then(function() { showToast('✅ 已複製到剪貼簿', false); })
    .catch(function() { showToast('請手動選取複製', true); });
}

function onCbChange(cb) {
  var id = cb.dataset.id;
  if (cb.checked) selIds[id] = true; else delete selIds[id];
  updateDelBar();
}
function toggleAllCb(checked) {
  selIds = {};
  var cbs = document.querySelectorAll('.order-cb');
  for (var i = 0; i < cbs.length; i++) { cbs[i].checked = checked; if (checked) selIds[cbs[i].dataset.id] = true; }
  updateDelBar();
}
function updateDelBar() {
  var n = Object.keys(selIds).length;
  var bar = document.getElementById('del-bar');
  if (bar) bar.style.display = 'flex';
  var dc = document.getElementById('del-count');
  if (dc) dc.textContent = n > 0 ? (n + ' 筆已選') : '未選取';
  var db = document.getElementById('del-btn');
  if (db) db.disabled = (n === 0);
  var cbAll = document.getElementById('cb-all');
  if (cbAll) {
    var total = document.querySelectorAll('.order-cb').length;
    cbAll.indeterminate = n > 0 && n < total;
    cbAll.checked = total > 0 && n === total;
  }
}
function doDeleteSelected() {
  var ids = Object.keys(selIds);
  if (!ids.length) return;
  if (!confirm(ids.length + ' 筆訂單確定刪除？無法復原。')) return;
  document.getElementById('del-btn').disabled = true;
  gasCall('deleteOrders', { ids: ids }, function(r) {
    if (r.success) { showToast('已刪除 ' + r.count + ' 筆', false); selIds = {}; loadOrders(curF); }
    else { showToast('刪除失敗', true); document.getElementById('del-btn').disabled = false; }
  }, function() { showToast('刪除失敗', true); document.getElementById('del-btn').disabled = false; });
}

function switchTab(t) {
  ['import', 'payment', 'supplier'].forEach(function(n) {
    document.getElementById('p-' + n).style.display = n === t ? 'block' : 'none';
    document.getElementById('t-' + n).className = 'tab' + (n === t ? ' on' : '');
  });
  if (t === 'payment') loadOrders(curF);
  if (t === 'supplier') loadSup();
}

var _tt;
function showToast(msg, isErr) {
  var w = document.getElementById('toast');
  var i = document.getElementById('ti');
  i.textContent = msg;
  i.style.background = isErr ? '#FDF0EE' : '#EDFBF3';
  i.style.color  = isErr ? '#8C2A1A' : '#1A6B40';
  i.style.border = isErr ? '1px solid #F0C0B8' : '1px solid #A8E6C3';
  w.style.opacity = '1';
  clearTimeout(_tt);
  _tt = setTimeout(function() { w.style.opacity = '0'; }, 2600);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) {
  if (!s) return '';
  return String(s).replace(/'/g,"'").replace(/\\/g,'\\\\');
}
</script>
</body>
</html>
