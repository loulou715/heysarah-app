<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HEYSARAH 後台管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#f5f5f5;color:#1a1a1a}
header{background:#1a1a1a;color:#fff;padding:16px 20px;text-align:center}
header h1{font-size:17px;font-weight:700;letter-spacing:2px}
header p{font-size:11px;opacity:.4;margin-top:2px}
.tabs{display:flex;background:#fff;border-bottom:2px solid #e8e8e8;overflow-x:auto}
.tabs button{flex:1;min-width:80px;padding:13px 6px;font-size:12px;font-weight:500;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;color:#888;white-space:nowrap;font-family:inherit;transition:all .2s;margin-bottom:-2px}
.tabs button.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:700}
.tabs button:hover:not(.active){background:#fafafa}
.pane{display:none;padding:18px;max-width:1000px;margin:0 auto}
.pane.active{display:block}
.card{background:#fff;border-radius:10px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card h3{font-size:13px;font-weight:700;margin-bottom:12px;color:#444}
textarea{width:100%;height:170px;border:1.5px solid #e0e0e0;border-radius:8px;padding:11px;font-size:13px;resize:vertical;font-family:inherit;line-height:1.7}
textarea:focus{outline:none;border-color:#1a1a1a}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
.btn-dark{background:#1a1a1a;color:#fff}.btn-dark:hover{background:#333}
.btn-dark:disabled{background:#ccc;cursor:not-allowed}
.btn-outline{background:#fff;color:#1a1a1a;border:1.5px solid #1a1a1a}
.btn-outline:hover{background:#f5f5f5}
.btn-green{background:#22c55e;color:#fff}.btn-green:disabled{background:#ccc;cursor:not-allowed}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.badge-ok{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;border-radius:20px;font-size:12px;font-weight:700}
.badge-warn{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:20px;font-size:12px;font-weight:700}
.hidden{display:none!important}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:9px 11px;background:#f8f8f8;font-weight:700;color:#777;border-bottom:2px solid #ebebeb;white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid #f2f2f2;vertical-align:middle}
tr:hover td{background:#fafafa}
.tw{overflow-x:auto;border-radius:8px;border:1px solid #ebebeb}
.sb{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.sb.待確認{background:#fef3c7;color:#b45309}
.sb.已付款{background:#dbeafe;color:#1d4ed8}
.sb.已出貨{background:#d1fae5;color:#065f46}
.sb.取消{background:#fee2e2;color:#dc2626}
.fb{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.fb button{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #ddd;background:#fff;color:#888;font-family:inherit;transition:all .2s}
.fb button.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.fr{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.ff{display:flex;flex-direction:column;gap:4px}
.ff label{font-size:11px;font-weight:700;color:#999;text-transform:uppercase}
.ff input{padding:8px 11px;border:1.5px solid #e0e0e0;border-radius:6px;font-size:13px;font-family:inherit}
.ff input:focus{outline:none;border-color:#1a1a1a}
.ff.w80{flex:0 0 80px}.ff.w160{flex:1 1 160px}.ff.w90{flex:0 0 90px}.ff.wauto{flex:1 1 130px}
.price{font-weight:700;color:#1a1a1a}
.tot{text-align:right;padding:10px 0 0;font-size:13px;font-weight:700}
.tot span{font-size:19px;color:#b8924a;margin-left:8px}
.msg-box{text-align:center;padding:36px;color:#bbb;font-size:13px}
.loading{text-align:center;padding:28px;color:#aaa;font-size:13px}
.act{display:flex;gap:5px}
.be{background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd;border-radius:5px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700}
.be:hover{background:#e0f2fe}
.bd{background:#fff0f0;color:#dc2626;border:1px solid #fecaca;border-radius:5px;padding:4px 9px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700}
.bd:hover{background:#fee2e2}
select{padding:7px 10px;border:1.5px solid #e0e0e0;border-radius:6px;font-size:12px;font-family:inherit;background:#fff}
select:focus{outline:none;border-color:#1a1a1a}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:11px 22px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<header>
  <h1>⚙️ HEYSARAH 後台管理</h1>
  <p>GROUP BUY ERP SYSTEM</p>
</header>
<div class="tabs">
  <button class="active" id="tbtn-import" onclick="showTab('import')">📥 批次匯入</button>
  <button id="tbtn-payment" onclick="showTab('payment')">💳 付款管理</button>
  <button id="tbtn-supplier" onclick="showTab('supplier')">📦 叫貨彙整</button>
  <button id="tbtn-products" onclick="showTab('products')">📋 商品目錄</button>
</div>

<!-- 批次匯入 -->
<div class="pane active" id="pane-import">
  <div class="card">
    <h3>貼上 LINE 群組訊息</h3>
    <textarea id="lineInput" placeholder="將 LINE 群組留言直接貼上，系統自動辨識訂單格式&#10;&#10;支援格式：&#10;10:23 小美 E20奶茶+1&#10;E43 37+1灰+1&#10;E20 奶茶+2藍+1"></textarea>
    <div style="margin-top:12px;display:flex;align-items:center;flex-wrap:wrap;gap:10px">
      <button class="btn btn-outline" onclick="doParse()">🔍 解析訂單</button>
      <span id="detectBadge" class="hidden"></span>
    </div>
  </div>
  <div class="card hidden" id="previewCard">
    <h3>訂單預覽</h3>
    <div class="tw">
      <table>
        <thead><tr><th>#</th><th>暱稱</th><th>商品代號</th><th>商品名稱</th><th>規格</th><th>數量</th><th>單價</th><th>小計</th></tr></thead>
        <tbody id="previewBody"></tbody>
      </table>
    </div>
    <div style="margin-top:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <div class="tot">合計：<span id="previewTotal">—</span></div>
      <button class="btn btn-green" id="importBtn" onclick="doImport()" disabled>✓ 確認匯入</button>
    </div>
  </div>
</div>

<!-- 付款管理 -->
<div class="pane" id="pane-payment">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">
      <div class="fb" style="margin:0">
        <button class="active" onclick="filterPay('all',this)">全部</button>
        <button onclick="filterPay('待確認',this)">待確認</button>
        <button onclick="filterPay('已付款',this)">已付款</button>
        <button onclick="filterPay('已出貨',this)">已出貨</button>
        <button onclick="filterPay('取消',this)">取消</button>
      </div>
      <button class="btn btn-outline btn-sm" onclick="loadPayment()">↺ 刷新</button>
    </div>
    <div id="paymentTable"><div class="msg-box">請點擊刷新載入訂單</div></div>
  </div>
</div>

<!-- 叫貨彙整 -->
<div class="pane" id="pane-supplier">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:#999">篩選狀態</span>
        <select id="supFilter">
          <option value="all">全部</option>
          <option value="待確認">待確認</option>
          <option value="已付款">已付款</option>
          <option value="已出貨">已出貨</option>
        </select>
      </div>
      <button class="btn btn-outline btn-sm" onclick="loadSupplier()">↺ 刷新</button>
    </div>
    <div id="supplierTable"><div class="msg-box">請點擊刷新載入彙整</div></div>
    <div class="tot hidden" id="supTotal"></div>
  </div>
</div>

<!-- 商品目錄 -->
<div class="pane" id="pane-products">
  <div class="card">
    <h3 id="prodFormTitle">➕ 新增商品</h3>
    <div class="fr" style="margin-top:12px">
      <div class="ff w80"><label>代號 *</label><input id="pCode" placeholder="E20" maxlength="10"></div>
      <div class="ff w160"><label>商品名稱 *</label><input id="pName" placeholder="V領荷葉套裝"></div>
      <div class="ff w90"><label>定價</label><input id="pPrice" type="number" placeholder="680" min="0"></div>
      <div class="ff w90"><label>連線優惠價</label><input id="pSale" type="number" placeholder="628" min="0"></div>
      <div class="ff wauto"><label>備註</label><input id="pNote" placeholder="顏色/尺寸說明"></div>
      <div class="ff" style="justify-content:flex-end">
        <label>&nbsp;</label>
        <div style="display:flex;gap:7px">
          <button class="btn btn-dark btn-sm" onclick="doSaveProduct()">💾 儲存</button>
          <button class="btn btn-outline btn-sm" onclick="clearProdForm()">✕</button>
        </div>
      </div>
    </div>
    <div id="prodFormMsg" style="margin-top:7px;font-size:12px;min-height:16px"></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3>商品列表</h3>
      <button class="btn btn-outline btn-sm" onclick="loadProducts()">↺ 刷新</button>
    </div>
    <div id="productsTable"><div class="loading">載入中...</div></div>
  </div>
</div>

<script>
var GAS = 'https://script.google.com/macros/s/AKfycbxAampl5u_AKoSlrpP7b3nXiVu-L9ZmmKslS-Qaa-ya_G0UwkUQCIdU8xUKMipu1-hCHw/exec';
var parsed = [], products = {}, payStatus = 'all';

document.addEventListener('DOMContentLoaded', function() {
  gasCall('getProducts', {}, function(d) {
    (d.products||[]).forEach(function(p){ products[p.code]=p; });
  });
  loadProducts();
});

// ── Tab ───────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.pane').forEach(function(e){ e.classList.remove('active'); });
  document.querySelectorAll('.tabs button').forEach(function(e){ e.classList.remove('active'); });
  document.getElementById('pane-'+name).classList.add('active');
  document.getElementById('tbtn-'+name).classList.add('active');
}

// ── API ───────────────────────────────────────────────────────
function gasCall(action, params, ok, fail) {
  var url = GAS + '?action=' + action;
  for (var k in params) {
    var v = params[k];
    url += '&' + k + '=' + encodeURIComponent(typeof v==='object' ? JSON.stringify(v) : v);
  }
  fetch(url).then(function(r){ return r.json(); })
    .then(function(d){
      if (d.success===false) { (fail||function(m){ toast('❌ '+m,1); })(d.message); }
      else ok(d);
    })
    .catch(function(e){ (fail||function(m){ toast('❌ '+m,1); })('網路錯誤: '+e.message); });
}

function toast(msg, err) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.style.background=err?'#dc2626':'#1a1a1a';
  t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },3000);
}
function fmt(n){ return n>0?'$'+Number(n).toLocaleString():'—'; }
function sbadge(s){ return '<span class="sb '+s+'">'+s+'</span>'; }

// ── 正規化 ────────────────────────────────────────────────────
function normalize(s){
  return s.replace(/[Ａ-Ｚａ-ｚ０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);})
          .replace(/[＋]/g,'+').replace(/[　]/g,' ');
}
function shouldSkip(l){
  if(/^\d{4}[.\-\/]\d{1,2}[.\-\/]\d{1,2}/.test(l)) return true;
  if(/^\d{1,2}月\d{1,2}日/.test(l)) return true;
  if(/已收回訊息|傳送貼圖|傳送照片|加入群組|離開群組/.test(l)) return true;
  if(/^(sarah|heysarah|管理員|小編)/i.test(l)) return true;
  return false;
}

// ── 解析 ──────────────────────────────────────────────────────
function parseOrders(text){
  var lines=normalize(text).split('\n'), results=[], lastNick='';
  for(var i=0;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line||shouldSkip(line)) continue;
    var nick='', orderPart=line;
    var pm=line.match(/^(\d{1,2}:\d{2}(?::\d{2})?)\s+(\S+)\s+(.*)/);
    if(pm){ nick=pm[2]; orderPart=pm[3]; lastNick=nick; }
    else {
      if(!/[A-Za-z]\d{2}/.test(line)){
        if(line.length<=20&&line.indexOf('http')===-1) lastNick=line;
        continue;
      }
      nick=lastNick;
    }
    var codeM=orderPart.match(/^([A-Za-z]{1,2}\d{2,3})\s*(.*)/);
    if(!codeM) continue;
    var code=codeM[1].toUpperCase(), rest=codeM[2];
    var pairs=[], re=/([^+\d]*?)\s*\+(\d+)/g, m, lastEnd=0;
    while((m=re.exec(rest))!==null){
      pairs.push({spec:m[1].trim(), qty:parseInt(m[2])});
      lastEnd=m.index+m[0].length;
    }
    if(pairs.length>0){
      var leftover=rest.substring(lastEnd).trim();
      if(leftover&&leftover.length<=6&&leftover.indexOf(' ')===-1&&leftover.indexOf('+')===-1)
        pairs[pairs.length-1].spec=(pairs[pairs.length-1].spec+leftover).trim();
      pairs.forEach(function(p){
        if(p.qty>0&&p.qty<100)
          results.push({nickname:nick||'未填',productCode:code,spec:p.spec,qty:p.qty});
      });
    }
  }
  return results;
}

function doParse(){
  var text=document.getElementById('lineInput').value.trim();
  if(!text){ toast('請貼上 LINE 訊息',1); return; }
  parsed=parseOrders(text);
  var badge=document.getElementById('detectBadge');
  badge.classList.remove('hidden');
  if(!parsed.length){
    badge.className='badge-warn'; badge.textContent='⚠ 未偵測到訂單';
    document.getElementById('previewCard').classList.add('hidden');
    document.getElementById('importBtn').disabled=true; return;
  }
  badge.className='badge-ok'; badge.textContent='✓ 偵測到 '+parsed.length+' 筆';
  renderPreview();
}

function renderPreview(){
  var tbody=document.getElementById('previewBody'), total=0;
  tbody.innerHTML='';
  parsed.forEach(function(o,i){
    var p=products[o.productCode]||{};
    var unit=p.salePrice||p.price||0, sub=unit*o.qty;
    total+=sub;
    tbody.innerHTML+='<tr>'+
      '<td>'+(i+1)+'</td>'+
      '<td>'+o.nickname+'</td>'+
      '<td><strong>'+o.productCode+'</strong></td>'+
      '<td>'+(p.name||'<span style="color:#ccc">未建立</span>')+'</td>'+
      '<td>'+(o.spec||'—')+'</td>'+
      '<td>'+o.qty+'</td>'+
      '<td>'+(unit>0?fmt(unit):'<span style="color:#ccc">未設定</span>')+'</td>'+
      '<td class="price">'+(sub>0?fmt(sub):'—')+'</td></tr>';
  });
  document.getElementById('previewTotal').textContent=total>0?fmt(total):'—';
  document.getElementById('previewCard').classList.remove('hidden');
  var btn=document.getElementById('importBtn');
  btn.disabled=false; btn.textContent='✓ 確認匯入 '+parsed.length+' 筆';
}

function doImport(){
  if(!parsed.length) return;
  var btn=document.getElementById('importBtn');
  btn.disabled=true; btn.textContent='匯入中...';
  gasCall('batchImport',{orders:parsed},function(d){
    toast('✓ 成功匯入 '+d.imported+' 筆訂單');
    parsed=[];
    document.getElementById('lineInput').value='';
    document.getElementById('detectBadge').classList.add('hidden');
    document.getElementById('previewCard').classList.add('hidden');
    btn.textContent='✓ 確認匯入'; btn.disabled=true;
  },function(msg){
    toast('❌ 匯入失敗：'+msg,1);
    btn.disabled=false; btn.textContent='✓ 確認匯入 '+parsed.length+' 筆';
  });
}

// ── 付款管理 ──────────────────────────────────────────────────
function filterPay(s,btn){
  payStatus=s;
  document.querySelectorAll('#pane-payment .fb button').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active'); loadPayment();
}
function loadPayment(){
  document.getElementById('paymentTable').innerHTML='<div class="loading">載入中...</div>';
  var p=payStatus==='all'?{}:{status:payStatus};
  gasCall('allOrders',p,function(d){ renderPayTable(d.orders||[]); });
}
function renderPayTable(orders){
  if(!orders.length){ document.getElementById('paymentTable').innerHTML='<div class="msg-box">暫無訂單</div>'; return; }
  var html='<div class="tw"><table><thead><tr><th>訂單編號</th><th>暱稱</th><th>商品代號</th><th>商品名稱</th><th>規格</th><th>數量</th><th>小計</th><th>狀態</th><th>變更狀態</th></tr></thead><tbody>';
  orders.forEach(function(o){
    html+='<tr>'+
      '<td style="font-size:10px;color:#bbb">'+o.orderId+'</td>'+
      '<td><strong>'+o.nickname+'</strong></td>'+
      '<td>'+o.productCode+'</td>'+
      '<td>'+o.productName+'</td>'+
      '<td>'+(o.spec||'—')+'</td>'+
      '<td>'+o.qty+'</td>'+
      '<td class="price">'+(o.subtotal>0?fmt(o.subtotal):'—')+'</td>'+
      '<td>'+sbadge(o.status)+'</td>'+
      '<td><select onchange="chgStatus(\''+o.orderId+'\',this.value)">'+
      ['待確認','已付款','已出貨','取消'].map(function(s){
        return '<option'+(s===o.status?' selected':'')+'>'+s+'</option>';
      }).join('')+'</select></td></tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('paymentTable').innerHTML=html;
}
function chgStatus(id,s){
  gasCall('updateStatus',{orderId:id,status:s},function(){ toast('✓ 狀態已更新：'+s); });
}

// ── 叫貨彙整 ──────────────────────────────────────────────────
function loadSupplier(){
  var s=document.getElementById('supFilter').value;
  document.getElementById('supplierTable').innerHTML='<div class="loading">載入中...</div>';
  document.getElementById('supTotal').classList.add('hidden');
  var p=s==='all'?{}:{status:s};
  gasCall('allOrders',p,function(d){ renderSupplier(d.orders||[]); });
}
function renderSupplier(orders){
  if(!orders.length){ document.getElementById('supplierTable').innerHTML='<div class="msg-box">暫無訂單</div>'; return; }
  var grp={}, keys=[];
  orders.forEach(function(o){
    var k=o.productCode+'||'+(o.spec||'');
    if(!grp[k]){ grp[k]={code:o.productCode,spec:o.spec||'',qty:0,subtotal:0}; keys.push(k); }
    grp[k].qty+=o.qty; grp[k].subtotal+=o.subtotal||0;
  });
  keys.sort(function(a,b){ return grp[a].code.localeCompare(grp[b].code); });
  var totalAmt=0;
  var html='<div class="tw"><table><thead><tr><th>商品代號</th><th>商品名稱</th><th>規格</th><th>總數量</th><th>單價</th><th>總金額</th></tr></thead><tbody>';
  keys.forEach(function(k){
    var g=grp[k], p=products[g.code]||{};
    var unit=p.salePrice||p.price||0;
    var total=g.subtotal>0?g.subtotal:(unit*g.qty);
    totalAmt+=total;
    html+='<tr>'+
      '<td><strong>'+g.code+'</strong></td>'+
      '<td>'+(p.name||'<span style="color:#ccc">未建立</span>')+'</td>'+
      '<td>'+(g.spec||'—')+'</td>'+
      '<td style="font-size:15px;font-weight:700">'+g.qty+'</td>'+
      '<td>'+(unit>0?fmt(unit):'—')+'</td>'+
      '<td class="price">'+(total>0?fmt(total):'—')+'</td></tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('supplierTable').innerHTML=html;
  var tb=document.getElementById('supTotal');
  tb.innerHTML='總訂貨金額：<span>'+(totalAmt>0?fmt(totalAmt):'—')+'</span>';
  tb.classList.remove('hidden');
}

// ── 商品目錄 ──────────────────────────────────────────────────
function loadProducts(){
  document.getElementById('productsTable').innerHTML='<div class="loading">載入中...</div>';
  gasCall('getProducts',{},function(d){
    products={};
    (d.products||[]).forEach(function(p){ products[p.code]=p; });
    renderProductsTable(d.products||[]);
  });
}
function renderProductsTable(list){
  if(!list.length){ document.getElementById('productsTable').innerHTML='<div class="msg-box">尚未建立商品</div>'; return; }
  var html='<div class="tw"><table><thead><tr><th>商品代號</th><th>商品名稱</th><th>定價</th><th>連線優惠價</th><th>備註</th><th>操作</th></tr></thead><tbody>';
  list.forEach(function(p){
    html+='<tr>'+
      '<td><strong>'+p.code+'</strong></td>'+
      '<td>'+p.name+'</td>'+
      '<td>'+(p.price>0?fmt(p.price):'—')+'</td>'+
      '<td class="price">'+(p.salePrice>0?fmt(p.salePrice):'—')+'</td>'+
      '<td style="color:#bbb">'+(p.note||'—')+'</td>'+
      '<td><div class="act">'+
      '<button class="be" onclick="editProd(\''+p.code+'\')">編輯</button>'+
      '<button class="bd" onclick="delProd(\''+p.code+'\')">刪除</button>'+
      '</div></td></tr>';
  });
  html+='</tbody></table></div>';
  document.getElementById('productsTable').innerHTML=html;
}
function doSaveProduct(){
  var code=document.getElementById('pCode').value.trim().toUpperCase();
  var name=document.getElementById('pName').value.trim();
  if(!code||!name){ document.getElementById('prodFormMsg').innerHTML='<span style="color:#dc2626">請填入代號和名稱</span>'; return; }
  var prod={code:code,name:name,
    price:Number(document.getElementById('pPrice').value)||0,
    salePrice:Number(document.getElementById('pSale').value)||0,
    note:document.getElementById('pNote').value.trim()};
  gasCall('saveProduct',{product:prod},function(d){
    var act=d.action==='updated'?'已更新':'已新增';
    document.getElementById('prodFormMsg').innerHTML='<span style="color:#15803d">✓ '+code+' '+act+'</span>';
    clearProdForm(); loadProducts(); toast('✓ 商品 '+code+' '+act);
  });
}
function editProd(code){
  var p=products[code]; if(!p) return;
  document.getElementById('pCode').value=p.code;
  document.getElementById('pName').value=p.name;
  document.getElementById('pPrice').value=p.price||'';
  document.getElementById('pSale').value=p.salePrice||'';
  document.getElementById('pNote').value=p.note||'';
  document.getElementById('prodFormTitle').textContent='✏️ 編輯商品：'+code;
  window.scrollTo({top:0,behavior:'smooth'});
}
function delProd(code){
  if(!confirm('確定刪除商品 '+code+' ？')) return;
  gasCall('deleteProduct',{code:code},function(){ toast('✓ 已刪除 '+code); loadProducts(); });
}
function clearProdForm(){
  ['pCode','pName','pPrice','pSale','pNote'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('prodFormTitle').textContent='➕ 新增商品';
  document.getElementById('prodFormMsg').innerHTML='';
}
</script>
</body>
</html>
