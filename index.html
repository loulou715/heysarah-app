<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEYSARAH | 訂單查詢</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#f0ebe3;
      min-height:100vh;
      font-family:'Noto Sans TC',sans-serif;
      padding:32px 16px 64px;
      display:flex;flex-direction:column;align-items:center;
    }
    .wrap{width:100%;max-width:520px}

    /* Logo */
    .logo-box{
      background:#fff;border-radius:20px;
      padding:28px 32px;text-align:center;margin-bottom:12px;
    }
    .logo-box img{width:100%;max-width:300px;height:auto;display:block;margin:0 auto}

    .tagline{
      text-align:center;font-size:.6rem;letter-spacing:5px;
      color:#aaa;margin-bottom:28px;text-transform:uppercase;
    }

    /* Dividers */
    .div{display:flex;align-items:center;gap:10px;margin:24px 0 14px}
    .div::before,.div::after{content:'';flex:1;height:1px;background:#ddd8d0}
    .div span{font-size:.68rem;letter-spacing:4px;color:#bbb;white-space:nowrap}

    /* Social */
    .social-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .soc{
      background:#fff;border-radius:16px;padding:18px 10px;
      display:flex;flex-direction:column;align-items:center;gap:8px;
      text-decoration:none;color:#444;transition:transform .15s;
    }
    .soc:hover{transform:translateY(-2px)}
    .soc svg{width:38px;height:38px}
    .soc span{font-size:.74rem}

    /* Query card */
    .query-card{background:#fff;border-radius:20px;padding:24px 20px}
    .q-intro{text-align:center;font-size:.84rem;color:#555;line-height:1.9;margin-bottom:20px}
    .f-label{font-size:.76rem;font-weight:500;color:#333;margin-bottom:6px;display:block}
    .f-input{
      width:100%;border:1.5px solid #e5ddd5;border-radius:10px;
      padding:13px 15px;font-size:.88rem;font-family:inherit;
      background:#faf8f5;outline:none;transition:border-color .2s;margin-bottom:10px;
    }
    .f-input:focus{border-color:#b8975a}
    .f-input::placeholder{color:#ccc}
    .q-btn{
      width:100%;background:#1a1a1a;color:#fff;border:none;border-radius:10px;
      padding:15px;font-size:.88rem;font-family:inherit;font-weight:500;
      letter-spacing:3px;cursor:pointer;transition:opacity .2s;margin-bottom:12px;
    }
    .q-btn:hover{opacity:.8}
    .q-btn:disabled{opacity:.5;cursor:default}
    .q-hint{font-size:.68rem;color:#bbb;text-align:center;line-height:2}

    /* Results */
    #result{margin-top:10px;width:100%}
    .r-card{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:8px}
    .r-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .r-id{font-size:.7rem;color:#bbb;font-family:monospace}
    .badge{font-size:.68rem;padding:3px 10px;border-radius:100px;font-weight:500}
    .s-待確認{background:#fff3cd;color:#856404}
    .s-已付款{background:#d1e7dd;color:#0a3622}
    .s-已出貨{background:#cfe2ff;color:#084298}
    .s-取消{background:#f8d7da;color:#842029}
    .r-name{font-size:.9rem;font-weight:500;margin-bottom:3px}
    .r-meta{font-size:.74rem;color:#aaa}
    .r-price{font-size:.88rem;color:#b8975a;font-weight:500;margin-top:5px}
    .r-msg{text-align:center;color:#bbb;font-size:.82rem;padding:24px}

    /* Format chips */
    .fmt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .fmt{background:#fff;border-radius:12px;padding:14px 8px;text-align:center}
    .fmt-code{font-family:monospace;font-size:.82rem;font-weight:600;color:#1a1a1a;margin-bottom:3px}
    .fmt-desc{font-size:.62rem;color:#bbb}

    /* Footer */
    .footer{margin-top:32px;text-align:center;font-size:.58rem;letter-spacing:4px;color:#bbb}
  </style>
</head>
<body>
<div class="wrap">

  <!-- Logo -->
  <div class="logo-box">
    <img src="/logo.png" alt="HEYSARAH">
  </div>
  <p class="tagline">BE GORGEOUS &nbsp;·&nbsp; YOU HAVE INFINITE POTENTIAL</p>

  <!-- 找到我們 -->
  <div class="div"><span>找 到 我 們</span></div>
  <div class="social-grid">

    <a href="https://www.instagram.com/heysarah_tw/" target="_blank" class="soc">
      <svg viewBox="0 0 38 38" fill="none">
        <defs>
          <radialGradient id="ig" cx="30%" cy="110%" r="140%">
            <stop offset="0%" stop-color="#fdf497"/>
            <stop offset="10%" stop-color="#fd5949"/>
            <stop offset="50%" stop-color="#d6249f"/>
            <stop offset="90%" stop-color="#285AEB"/>
          </radialGradient>
        </defs>
        <rect width="38" height="38" rx="9" fill="url(#ig)"/>
        <rect x="10" y="10" width="18" height="18" rx="5" stroke="white" stroke-width="2" fill="none"/>
        <circle cx="19" cy="19" r="5" stroke="white" stroke-width="2" fill="none"/>
        <circle cx="25.5" cy="12.5" r="1.5" fill="white"/>
      </svg>
      <span>Instagram</span>
    </a>

    <a href="https://www.heysarah-tw.com/" target="_blank" class="soc">
      <svg viewBox="0 0 38 38" fill="none">
        <rect width="38" height="38" rx="9" fill="#ebebeb"/>
        <circle cx="19" cy="19" r="9" stroke="#555" stroke-width="1.8" fill="none"/>
        <ellipse cx="19" cy="19" rx="4.5" ry="9" stroke="#555" stroke-width="1.4" fill="none"/>
        <line x1="10" y1="19" x2="28" y2="19" stroke="#555" stroke-width="1.4"/>
        <line x1="11.5" y1="14.5" x2="26.5" y2="14.5" stroke="#555" stroke-width="1.1"/>
        <line x1="11.5" y1="23.5" x2="26.5" y2="23.5" stroke="#555" stroke-width="1.1"/>
      </svg>
      <span>官方網站</span>
    </a>

    <a href="https://lin.ee/yNryEg1" target="_blank" class="soc">
      <svg viewBox="0 0 38 38" fill="none">
        <rect width="38" height="38" rx="9" fill="#06C755"/>
        <path d="M19 8C12.4 8 7 12.3 7 17.5c0 3.2 1.9 6 5 7.8-.2.6-.7 2.2-.8 2.5-.1.4.1.4.3.3.2-.1 2-1.4 2.9-1.9.8.1 1.6.2 2.4.2 6.6 0 12-4.3 12-9.5S25.6 8 19 8z" fill="white"/>
      </svg>
      <span>LINE@</span>
    </a>

  </div>

  <!-- 訂單查詢 -->
  <div class="div"><span>訂 單 查 詢</span></div>
  <div class="query-card">
    <p class="q-intro">請輸入您在 LINE 社群的顯示暱稱<br>即可查詢訂單記錄與付款狀態</p>
    <label class="f-label">LINE 暱稱</label>
    <input id="nameInput" class="f-input" placeholder="輸入您的 LINE 顯示名稱"
           onkeydown="if(event.key==='Enter')query()">
    <button id="queryBtn" class="q-btn" onclick="query()">查 詢 訂 單</button>
    <p class="q-hint">暱稱需與 LINE 群組顯示名稱完全一致<br>包含大小寫與特殊符號</p>
  </div>

  <div id="result"></div>

  <!-- 下單格式 -->
  <div class="div"><span>下 單 格 式</span></div>
  <div class="fmt-grid">
    <div class="fmt"><div class="fmt-code">A01黑L+1</div><div class="fmt-desc">商品 規格 數量</div></div>
    <div class="fmt"><div class="fmt-code">A01白+2</div><div class="fmt-desc">商品 規格 數量</div></div>
    <div class="fmt"><div class="fmt-code">B01+1</div><div class="fmt-desc">商品 數量</div></div>
  </div>

  <div class="footer">HEYSARAH &nbsp;·&nbsp; @HEYSARAH_TW &nbsp;·&nbsp; HEYSARAH-TW.COM</div>

</div><!-- /wrap -->

<script>
  var API = 'https://script.google.com/macros/s/AKfycbxAampl5u_AKoSlrpP7b3nXiVu-L9ZmmKslS-Qaa-ya_G0UwkUQCIdU8xUKMipu1-hCHw/exec';

  async function query() {
    var name = document.getElementById('nameInput').value.trim();
    if (!name) return;
    var btn = document.getElementById('queryBtn');
    var el  = document.getElementById('result');
    btn.disabled = true;
    btn.textContent = '查詢中...';
    el.innerHTML = '<div class="r-msg">查詢中⋯</div>';
    try {
      var res  = await fetch(API + '?action=query&nickname=' + encodeURIComponent(name));
      var data = await res.json();
      if (!data.success || !data.orders || !data.orders.length) {
        el.innerHTML = '<div class="r-msg">📋 查無訂單，請確認名稱是否與社群一致</div>';
      } else {
        el.innerHTML = data.orders.map(function(o) {
          return '<div class="r-card">' +
            '<div class="r-head"><span class="r-id">' + esc(o.orderId) + '</span>' +
            '<span class="badge s-' + esc(o.status) + '">' + esc(o.status) + '</span></div>' +
            '<div class="r-name">[' + esc(o.productCode) + '] ' + esc(o.productName) + '</div>' +
            '<div class="r-meta">' + (o.spec ? '規格：' + esc(o.spec) + '　' : '') + '數量：' + o.qty + ' 件</div>' +
            '<div class="r-price">NT$ ' + o.subtotal.toLocaleString() + '</div>' +
            '<div class="r-meta" style="margin-top:4px">' + esc(o.timestamp) + '</div>' +
            '</div>';
        }).join('');
      }
    } catch(e) {
      el.innerHTML = '<div class="r-msg">❌ 連線失敗，請稍後再試</div>';
    }
    btn.disabled = false;
    btn.textContent = '查 詢 訂 單';
  }

  function esc(s) {
    return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
  }
</script>
</body>
</html>
