<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HEYSARAH — 訂單查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#faf9f7;color:#2c2c2c;min-height:100vh}
.hero{text-align:center;padding:44px 20px 30px;background:linear-gradient(180deg,#f5f0e8 0%,#faf9f7 100%)}
.logo-wrap{width:90px;height:90px;border-radius:50%;background:#fff;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.08);overflow:hidden}
.logo-wrap img{width:80px;height:80px;object-fit:contain}
.brand{font-family:'Cormorant Garamond',serif;font-size:32px;color:#b8924a;font-style:italic;letter-spacing:1px}
.tagline{font-size:11px;letter-spacing:4px;color:#b8924a;opacity:.7;margin-top:4px;text-transform:uppercase}

.section{padding:20px 16px;max-width:480px;margin:0 auto}
.section-title{font-size:11px;letter-spacing:3px;color:#b8924a;text-align:center;margin-bottom:16px;text-transform:uppercase}

.social-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.social-btn{display:flex;align-items:center;gap:7px;padding:10px 18px;border-radius:50px;text-decoration:none;font-size:13px;font-weight:500;transition:all .2s;border:1.5px solid transparent}
.social-btn.ig{background:#fff;color:#2c2c2c;border-color:#e8e0d4;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.social-btn.ig:hover{border-color:#b8924a;color:#b8924a}
.social-btn.web{background:#2c2c2c;color:#fff}
.social-btn.web:hover{background:#444}
.social-btn.line{background:#06c755;color:#fff}
.social-btn.line:hover{background:#05b34d}
.social-icon{width:18px;height:18px;object-fit:contain}

.query-card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 24px rgba(0,0,0,.07);margin-bottom:16px}
.query-card h2{font-family:'Cormorant Garamond',serif;font-size:22px;color:#b8924a;margin-bottom:18px;text-align:center;font-style:italic}
.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:11px;letter-spacing:2px;color:#999;margin-bottom:6px;text-transform:uppercase}
.input-group input{width:100%;padding:12px 16px;border:1.5px solid #e8e0d4;border-radius:10px;font-size:14px;font-family:inherit;background:#fdfcfb;transition:border .2s}
.input-group input:focus{outline:none;border-color:#b8924a}
.query-btn{width:100%;padding:13px;background:#2c2c2c;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;letter-spacing:1px;transition:background .2s}
.query-btn:hover{background:#444}
.query-btn:disabled{background:#ccc;cursor:not-allowed}

/* 收據樣式 */
.receipt-wrap{margin-top:4px}
.receipt-card{background:#fff;border-radius:16px;padding:22px;box-shadow:0 4px 24px rgba(0,0,0,.08);margin-bottom:12px}
.receipt-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.receipt-date{font-size:12px;color:#aaa}
.status-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700}
.status-chip.待確認{background:#fef3c7;color:#b45309}
.status-chip.已付款{background:#dbeafe;color:#1d4ed8}
.status-chip.已出貨{background:#d1fae5;color:#065f46}
.status-chip.取消{background:#fee2e2;color:#dc2626}
.order-item{margin-bottom:14px}
.item-top{display:flex;justify-content:space-between;align-items:baseline}
.item-code{font-weight:700;font-size:15px}
.item-qty{font-size:12px;color:#aaa;margin-left:4px}
.item-price{font-weight:700;font-size:15px;color:#2c2c2c}
.item-name{font-size:12px;color:#999;margin:2px 0}
.item-spec{font-size:12px;color:#666;display:flex;justify-content:space-between;padding:2px 0 2px 8px}
.receipt-divider{border:none;border-top:1px dashed #e8e0d4;margin:14px 0}
.receipt-row{display:flex;justify-content:space-between;font-size:13px;color:#888;margin-bottom:6px}
.receipt-total{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.receipt-total .label{font-size:12px;letter-spacing:2px;color:#b8924a;text-transform:uppercase;font-weight:700}
.receipt-total .amount{font-family:'Cormorant Garamond',serif;font-size:32px;color:#b8924a;font-weight:600}

.no-result{text-align:center;padding:32px;color:#bbb;font-size:13px;background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.05)}

.format-card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.format-card pre{font-size:12px;color:#888;line-height:2;font-family:inherit;white-space:pre-wrap}
.format-ex{background:#faf9f7;border-radius:8px;padding:12px 14px;margin-top:10px}
.format-ex span{color:#2c2c2c;font-weight:600}

footer{text-align:center;padding:32px 20px;font-size:11px;color:#ccc;letter-spacing:1px}
</style>
</head>
<body>

<div class="hero">
  <div class="logo-wrap">
    <img src="/logo.png" alt="HEYSARAH">
  </div>
  <div class="brand">HEYSARAH</div>
  <div class="tagline">SELECT SHOP</div>
</div>

<div class="section">
  <div class="section-title">找到我們</div>
  <div class="social-row">
    <a class="social-btn ig" href="https://www.instagram.com/heysarah_tw/" target="_blank">
      <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".5" fill="currentColor" stroke="none"/></svg>
      Instagram
    </a>
    <a class="social-btn web" href="https://www.heysarah-tw.com/" target="_blank">
      <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
      官方網站
    </a>
    <a class="social-btn line" href="https://lin.ee/yNryEg1" target="_blank">
      <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19.365 9.89c.50 0 .906.41.906.91s-.405.91-.906.91h-2.44v1.44h2.44c.5 0 .906.41.906.91s-.405.91-.906.91H15.97a.908.908 0 01-.906-.91V9.89c0-.5.405-.91.906-.91h3.395zm-5.51 0c.5 0 .905.41.905.91v4.17c0 .5-.405.91-.906.91s-.905-.41-.905-.91V9.89c0-.5.405-.91.905-.91zm-2.38 4.17l-2.73-3.67v3.58c0 .5-.405.91-.905.91s-.906-.41-.906-.91V9.89c0-.5.405-.91.906-.91.27 0 .5.11.68.3l2.73 3.67V9.89c0-.5.405-.91.905-.91s.906.41.906.91v4.17c0 .5-.405.91-.906.91-.27 0-.5-.11-.68-.3zM7.27 9.89c.5 0 .905.41.905.91v4.17c0 .5-.405.91-.905.91s-.906-.41-.906-.91V9.89c0-.5.405-.41.906-.91zM12 2C6.477 2 2 6.038 2 11c0 3.68 2.29 6.87 5.67 8.5-.1.37-.65 2.48-.68 2.62-.04.18.07.18.14.13.07-.04 3.3-2.18 4.64-3.07.73.1 1.48.15 2.23.15 5.523 0 10-4.038 10-9S17.523 2 12 2z"/></svg>
      LINE@
    </a>
  </div>
</div>

<div class="section">
  <div class="section-title">訂單查詢</div>
  <div class="query-card">
    <h2>查詢我的訂單</h2>
    <div class="input-group">
      <label>LINE 暱稱</label>
      <input id="nickInput" type="text" placeholder="輸入您的 LINE 暱稱" autocomplete="off">
    </div>
    <button class="query-btn" id="queryBtn" onclick="doQuery()">🔍 查詢訂單</button>
  </div>
  <div id="results"></div>
</div>

<div class="section">
  <div class="section-title">下單格式</div>
  <div class="format-card">
    <div style="font-size:12px;color:#aaa;margin-bottom:10px">在群組中依照以下格式留言下單：</div>
    <div class="format-ex">
      <div style="font-size:11px;color:#aaa;margin-bottom:6px">基本格式</div>
      <pre><span>商品代號 顏色/尺寸+數量</span></pre>
    </div>
    <div class="format-ex" style="margin-top:8px">
      <div style="font-size:11px;color:#aaa;margin-bottom:6px">範例</div>
      <pre><span>EX: E20奶茶+1
EX: E43 37+1
EX: E20奶茶+1藍+2</span></pre>
    </div>
  </div>
</div>

<footer>© 2025 HEYSARAH SELECT SHOP<br>All rights reserved.</footer>

<script>
var GAS = 'https://script.google.com/macros/s/AKfycbxAampl5u_AKoSlrpP7b3nXiVu-L9ZmmKslS-Qaa-ya_G0UwkUQCIdU8xUKMipu1-hCHw/exec';

document.getElementById('nickInput').addEventListener('keydown', function(e){
  if(e.key==='Enter') doQuery();
});

function doQuery(){
  var nick=document.getElementById('nickInput').value.trim();
  if(!nick){ showMsg('請輸入 LINE 暱稱'); return; }
  var btn=document.getElementById('queryBtn');
  btn.disabled=true; btn.textContent='查詢中...';
  var url=GAS+'?action=queryOrders&nickname='+encodeURIComponent(nick);
  fetch(url).then(function(r){ return r.json(); })
    .then(function(d){
      btn.disabled=false; btn.textContent='🔍 查詢訂單';
      if(d.success===false){ showMsg('❌ '+d.message); return; }
      renderResults(d.orders||[]);
    })
    .catch(function(e){
      btn.disabled=false; btn.textContent='🔍 查詢訂單';
      showMsg('❌ 網路錯誤，請稍後再試');
    });
}

function showMsg(msg){
  document.getElementById('results').innerHTML='<div class="no-result">'+msg+'</div>';
}

function fmt(n){ return n>0?'$'+Number(n).toLocaleString():'—'; }

function renderResults(orders){
  if(!orders.length){
    document.getElementById('results').innerHTML='<div class="no-result">查無訂單，請確認暱稱是否正確</div>';
    return;
  }

  // 依日期分組
  var groups={}, gkeys=[];
  orders.forEach(function(o){
    var date=(o.timestamp||'').split(' ')[0]||'未知日期';
    var key=date+'_'+o.status;
    if(!groups[key]){ groups[key]={date:date,status:o.status,items:[],total:0}; gkeys.push(key); }
    groups[key].items.push(o);
    groups[key].total+=o.subtotal||0;
  });

  var html='<div class="receipt-wrap">';
  gkeys.forEach(function(key){
    var g=groups[key];
    // 合併同代號+規格
    var merged={}, mkeys=[];
    g.items.forEach(function(o){
      var mk=o.productCode+'_'+(o.spec||'');
      if(!merged[mk]){ merged[mk]={code:o.productCode,name:o.productName,spec:o.spec,qty:0,subtotal:0}; mkeys.push(mk); }
      merged[mk].qty+=o.qty; merged[mk].subtotal+=o.subtotal||0;
    });

    html+='<div class="receipt-card">';
    html+='<div class="receipt-head">'+
      '<span class="receipt-date">📅 '+g.date+'</span>'+
      '<span class="status-chip '+g.status+'">'+g.status+'</span></div>';

    mkeys.forEach(function(mk){
      var item=merged[mk];
      html+='<div class="order-item">'+
        '<div class="item-top">'+
          '<div><span class="item-code">'+item.code+'</span><span class="item-qty">×'+item.qty+'</span></div>'+
          '<span class="item-price">'+(item.subtotal>0?fmt(item.subtotal):'—')+'</span>'+
        '</div>'+
        (item.name&&item.name!==item.code?'<div class="item-name">'+item.name+'</div>':'')+
        '<div class="item-spec"><span>- '+(item.spec||'無規格')+'</span><span>×'+item.qty+'</span></div>'+
      '</div>';
    });

    html+='<hr class="receipt-divider">';
    html+='<div class="receipt-row"><span>商品小計</span><span>'+fmt(g.total)+'</span></div>';
    html+='<div class="receipt-total"><span class="label">Total</span><span class="amount">'+fmt(g.total)+'</span></div>';
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('results').innerHTML=html;
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
</body>
</html>
